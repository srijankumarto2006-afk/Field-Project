<section class="ambiance-gallery">
    <h2 class="gallery-title">EXPERIENCE THE BEACHSIDE AMBIANCE AT ZURI PHUKET</h2>

    <div class="gallery-grid">
        <!-- Outdoor Column -->
        <div class="gallery-item">
            <div class="slider-container">
                <button class="arrow prev" onclick="moveSlider(this, -1)">&#10094;</button>
                <div class="slider-window">
                    <img src="outdoor1.jpg" alt="Outdoor Seating" class="active">
                </div>
                <button class="arrow next" onclick="moveSlider(this, 1)">&#10095;</button>
            </div>
            <p class="caption">Outdoor</p>
        </div>

        <!-- Indoor Column -->
        <div class="gallery-item">
            <div class="slider-container">
                <button class="arrow prev" onclick="moveSlider(this, -1)">&#10094;</button>
                <div class="slider-window">
                    <img src="indoor1.jpg" alt="Indoor Seating" class="active">
                </div>
                <button class="arrow next" onclick="moveSlider(this, 1)">&#10095;</button>
            </div>
            <p class="caption">Indoor</p>
        </div>

        <!-- Bar Column -->
        <div class="gallery-item">
            <div class="slider-container">
                <button class="arrow prev" onclick="moveSlider(this, -1)">&#10094;</button>
                <div class="slider-window">
                    <img src="bar1.jpg" alt="Bar Area" class="active">
                </div>
                <button class="arrow next" onclick="moveSlider(this, 1)">&#10095;</button>
            </div>
            <p class="caption">Bar</p>
        </div>
    </div>
</section>
