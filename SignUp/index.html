<!DOCTYPE html>
<html>
<head>
<title>Zomato Signup</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<button onclick="openSignup()">Open Sign Up</button>

<!-- DARK BACKGROUND -->
<div class="overlaysign" id="over">

    <div class="signup-box">

        <div class="signup-header">
            <h2>Sign up</h2>
            <span class="close" onclick="closeSignup()">✕</span>
        </div>

        <input type="text" placeholder="Full Name" class="input-box">
        <input type="email" placeholder="Email" class="input-box">

        <div class="terms">
            <input type="checkbox" class="check">
            <p>I agree to Zomato's 
            <span>Terms of Service</span>, 
            <span>Privacy Policy</span> and 
            <span>Content Policies</span>
            </p>
        </div>

        <button class="create-btn">Create account</button>

        <div class="divider">or</div>

        <button class="google-btn">
          <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" WIDTH="20PX">
            Sign in with Google
        </button>

        <div class="login-text">
            Already have an account? <span>Log in</span>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
