<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Delivery Hero</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./script.js">
</head>
<body>

    <section class="hero">
        <div class="swirls">
            <svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
                <path d="M-50,200 Q200,50 400,300 T800,100" fill="none" stroke="#fce4ec" stroke-width="2"/>
                <path d="M1000,600 Q800,800 600,600 T200,900" fill="none" stroke="#fce4ec" stroke-width="2"/>
            </svg>
        </div>

        <img src="https://b.zmtcdn.com/data/o2_assets/364f85b5586700f0a3f7108cedf543011739962117.png" class="food burger" alt="Burger">
        <img src="https://b.zmtcdn.com/data/o2_assets/b4f62434088b0ddfa9b370991f58ca601743060218.png" class="food dimsum" alt="Dimsum">
        <img src="https://b.zmtcdn.com/data/o2_assets/316495f4ba2a9c9d9aa97fed9fe61cf71743059024.png" class="food pizza" style="opacity: 1; transform: none;"  alt="Pizza">

        <div class="content">
            <h1>Better food for <br> more people</h1>
            <p>For over a decade, we've enabled our customers to discover new tastes, delivered right to their doorstep</p>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-text">
                    <span class="count">3,00,000+</span>
                    <span class="label">restaurants</span>
                </div>
                <img src="https://cdn-icons-png.flaticon.com/512/123/123403.png" alt="icon">
            </div>
            <div class="divider"></div>
            <div class="stat-item">
                <div class="stat-text">
                    <span class="count">800+</span>
                    <span class="label">cities</span>
                </div>
                <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png" alt="icon">
            </div>
            <div class="divider"></div>
            <div class="stat-item">
                <div class="stat-text">
                    <span class="count">3 billion+</span>
                    <span class="label">orders delivered</span>
                </div>
                <img src="https://cdn-icons-png.flaticon.com/512/1554/1554561.png" alt="icon">
            </div>
        </div>
    </section>

</body>
</html>
