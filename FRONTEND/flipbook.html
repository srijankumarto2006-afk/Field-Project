<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Orient Pearl - Ultra-Large Menu</title>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    <style>
        :root {
            --bg-main: #f4f4f4; 
            --bar-bg: #333333;
            --header-h: 50px;
            --footer-h: 55px;
        }

        body {
           margin: 0;
            background-color: var(--bg-main);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            height: var(--header-h);
            background: var(--bar-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            z-index: 10;
        }

       .logo { color: white; font-weight: 700; letter-spacing: 2px; font-size: 14px; }
        
        .search-box {
            background: #444;
            border: none;
            padding: 6px 15px;
            border-radius: 2px;
            color: white;
            width: 220px;
            font-size: 13px;
        }

        /* --- MAXIMIZED CONTAINER --- */
        #container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Reduced padding from 20px to 5px to give the book more room */
            padding: 5px; 
            
            perspective: 3500px;
          background: radial-gradient(circle, #ffffff 0%, #ffffff 100%);
            width: 100vw;
        }

        .book-wrapper {
            position: relative;
            /* Deeper shadow for a large-scale object */
            box-shadow: 0 60px 180px rgba(0,0,0,0.15); 
        }

        .page {
            background-color: white;
            overflow: hidden;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: fill; 
            display: block;
        }

        footer {
            height: 60px;
            background: var(--bar-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            color: #999;
            z-index: 10;
            border-top: 1px solid #222;
        }

        .nav-btn {
            background: none;
            border: 1px solid #444;
            color: white;
            font-size: 16px;
            cursor: pointer;
            padding: 8px 25px;
            border-radius: 4px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-btn:hover { background: #333; border-color: #666; }
    </style>
</head>
<body>

    <header>
        <div class="logo">HOTEL ORIENT PEARL</div>
        <input type="text" class="search-box" placeholder="Search menu...">
    </header>

    <div id="container">
        <div class="book-wrapper">
            <div id="book">
                <div class="page" data-density="hard"><img src="./cover.png"></div>
                <div class="page"><img src="./men1.png"></div>
                <div class="page"><img src="./men2.png"></div>
                <div class="page"><img src="./men3.png"></div>
                <div class="page"><img src="./men4.png"></div>
                <div class="page"><img src="./men5.png"></div>
                <div class="page"><img src="./men6.png"></div>
                <div class="page"><img src="./men7.png"></div>
                <div class="page"><img src="./men8.png"></div>
                <div class="page"><img src="./men10.png"></div>
                <div class="page"><img src="./men9.png"></div>
                 <div class="page"><img src="./men.png"></div>
                  <div class="page"><img src="./men12.png"></div>
                  <div class="page"><img src="./men13.png"></div>
                  <div class="page"><img src="./men14.png"></div>
                  <div class="page"><img src="./men15.png"></div>
                  <div class="page"><img src="./men16.png"></div>
                  <div class="page"><img src="./men16.5.png"></div>
                  <div class="page"><img src="./men17.png"></div>
                  <div class="page"><img src="./men18.png"></div>
                  <div class="page"><img src="./men19.png"></div>
                  <div class="page"><img src="./men20.png"></div>
                   <div class="page"><img src="./men21.png"></div>
                 
                  
                
               
                <div class="page" data-density="hard"><img src="./last.png"></div>
            </div>
        </div>
    </div>

    <footer>
        <button class="nav-btn" id="prev">PREVIOUS</button>
        <div id="page-num" style="min-width: 130px; text-align: center; letter-spacing: 1px;">1 / 12</div>
        <button class="nav-btn" id="next">NEXT</button>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const pageFlip = new St.PageFlip(document.getElementById('book'), {
                // INCREASED BASE SCALE
                width: 680, 
                height: 1020,
                
                size: "stretch", 
                minWidth: 400, 
                // Increased maxWidth and maxHeight to allow full-screen takeover
                maxWidth: 2200, 
                minHeight: 600, 
                maxHeight: 2800,
                
                maxShadowOpacity: 0.8, 
                showCover: true,
                usePortrait: false, 
                flippingTime: 1100, 
                drawShadow: true,
                mobileScrollSupport: false
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));

            document.getElementById('prev').addEventListener('click', () => pageFlip.flipPrev());
            document.getElementById('next').addEventListener('click', () => pageFlip.flipNext());

            pageFlip.on('flip', (e) => {
                const total = pageFlip.getPageCount();
                const current = e.data + 1;
                
                if (current === 1 || current === total) {
                    document.getElementById('page-num').innerText = current + " / " + total;
                } else {
                    document.getElementById('page-num').innerText = current + "-" + (current + 1) + " / " + total;
                }
            });
        });
    </script>
</body>
</html>
