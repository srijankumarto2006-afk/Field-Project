<!DOCTYPE html>
<html>

<head>
<title>Firebase OTP Login</title>

<!-- Firebase SDK v8 (IMPORTANT) -->

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<style>

body{
font-family: Arial;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.modal-content{
background:white;
width:350px;
margin:100px auto;
padding:20px;
border-radius:10px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#ff4d4d;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.close{
float:right;
cursor:pointer;
font-size:20px;
}

</style>

</head>

<body>

<button onclick="openLogin()">Login</button>

<div class="modal" id="loginBox">

<div class="modal-content">

<span class="close" onclick="closeLogin()">×</span>

<h2>Login with OTP</h2>

<input type="text" id="phone" placeholder="Enter Phone Number">

<div id="recaptcha-container"></div>

<button onclick="sendOTP()">Send OTP</button>

<div id="otpBox" style="display:none;">

<input type="text" id="otp" placeholder="Enter OTP">

<button onclick="verifyOTP()">Verify OTP</button>

</div>

</div>
</div>


<script>

/* Firebase Config (YOUR REAL CONFIG) */

var firebaseConfig = {

apiKey: "AIzaSyBqOP61iI-25DoCzwos-MManTdguvDxNBk",

authDomain: "otp-login-d48ac.firebaseapp.com",

projectId: "otp-login-d48ac",

storageBucket: "otp-login-d48ac.firebasestorage.app",

messagingSenderId: "131487557380",

appId: "1:131487557380:web:665bed0e61623c190b5251"

};


/* Initialize Firebase */

firebase.initializeApp(firebaseConfig);



/* Recaptcha */

window.onload = function(){

window.recaptchaVerifier =
new firebase.auth.RecaptchaVerifier(
'recaptcha-container');

};



function openLogin(){

document.getElementById("loginBox").style.display="block";

}


function closeLogin(){

document.getElementById("loginBox").style.display="none";

}



function sendOTP(){

var number="+91"+document.getElementById("phone").value;


firebase.auth().signInWithPhoneNumber(
number,
window.recaptchaVerifier)

.then(function(e){

window.confirmationResult=e;

alert("OTP Sent Successfully");

document.getElementById("otpBox").style.display="block";

})

.catch(function(error){

alert(error.message);

});

}



function verifyOTP(){

var code=document.getElementById("otp").value;


confirmationResult.confirm(code)

.then(function(){

alert("Login Successful");

closeLogin();

})

.catch(function(){

alert("Invalid OTP");

});

}

</script>

</body>
</html>
