<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dine Divine | Exquisite Flavors</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./script.js">
    
</head>
<body class="text-white min-h-screen hero-gradient relative">

    <!-- Decorative Elements (Leaves/Veggies) -->
    <div class="absolute top-20 left-10 w-16 opacity-60 floating-leaf" style="animation-delay: 0s;">
        <svg viewBox="0 0 100 100" fill="#4ade80"><path d="M50 0 C70 30 90 50 100 100 C50 90 30 70 0 50 C30 20 40 10 50 0"></path></svg>
    </div>
    <div class="absolute bottom-20 right-10 w-20 opacity-40 floating-leaf" style="animation-delay: 2s;">
        <svg viewBox="0 0 100 100" fill="#22c55e"><path d="M50 0 C70 30 90 50 100 100 C50 90 30 70 0 50 C30 20 40 10 50 0"></path></svg>
    </div>
    <div class="absolute top-1/2 left-1/4 w-4 h-4 bg-red-500 rounded-full opacity-80 blur-sm"></div>

    <!-- Navigation -->
    <header class="container mx-auto px-6 pt-6 relative z-50">
        <nav class="glass-nav px-8 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-2xl font-extrabold tracking-tight">Dine | Divine</span>
            </div>
            
            <ul class="hidden md:flex items-center gap-8 text-sm font-medium text-gray-200">
                <li><a href="#" class="text-white border-b-2 border-white pb-1">Home</a></li>
                <li><a href="#" class="hover:text-white transition">About</a></li>
                <li><a href="#" class="hover:text-white transition">Menu</a></li>
                <li><a href="#" class="hover:text-white transition">Blog</a></li>
                <li><a href="#" class="hover:text-white transition">Contact</a></li>
            </ul>

            <div class="flex items-center gap-6">
                <button class="hover:scale-110 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                </button>
                <div class="relative cursor-pointer hover:scale-110 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
                    <span class="absolute -top-2 -right-2 bg-green-500 text-[10px] w-4 h-4 rounded-full flex items-center justify-center">2</span>
                </div>
                <button class="bg-white text-black px-6 py-2 rounded-full font-bold text-sm hover:bg-gray-100 transition shadow-lg">Sign in</button>
            </div>
        </nav>
    </header>

    <!-- Hero Content -->
    <main class="container mx-auto px-6 pt-16 md:pt-24 flex flex-col md:flex-row items-center relative z-10">
        
        <!-- Left Side -->
        <div class="md:w-1/2 text-center md:text-left">
            <div class="inline-flex items-center gap-3 mb-6">
                <div class="play-btn-container group overflow-hidden rounded-full border border-white/20 p-1">
                    <div class="relative w-24 h-12 bg-gray-800 rounded-full flex items-center justify-center overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1544025162-d76694265947?w=200" class="w-full h-full object-cover opacity-60" alt="Video">
                        <div class="absolute inset-0 bg-black/20"></div>
                        <div class="absolute flex items-center justify-center">
                            <svg class="w-6 h-6 fill-white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                </div>
            </div>

            <h1 class="text-5xl md:text-7xl font-extrabold leading-[1.1] mb-6">
                Savor the<br>
                <span class="text-white">Exquisite Flavors</span><br>
                of Dine Divine
            </h1>
            
            <p class="text-lg text-gray-300 mb-10 max-w-lg">
                Experience Culinary Excellence in Every Bite. Our chefs blend tradition with innovation to create unforgettable moments.
            </p>

            <button class="bg-white text-black px-8 py-4 rounded-xl font-bold text-lg btn-shine shadow-2xl hover:-translate-y-1 transition duration-300">
                Reserve Your Table
            </button>
        </div>

        <!-- Right Side - Main Food Image -->
        <div class="md:w-1/2 mt-16 md:mt-0 relative flex justify-center items-center">
            
            <!-- Salad Plate -->
            <div class="relative z-20 transform hover:scale-105 transition-transform duration-500">
                <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600" alt="Exquisite Salad" class="w-[350px] md:w-[450px] h-[350px] md:h-[450px] object-cover rounded-full border-[12px] border-white/5 food-shadow">
            </div>

            <!-- Burger - Floating Right -->
            <div class="absolute -right-4 md:-right-20 top-0 z-30 transform hover:rotate-6 transition-transform">
                <img src="https://img.pikbest.com/png-images/20241013/fast-fresh-and-flying-burger-on-air-takes-off_10957846.png!bw700" alt="Premium Burger" class="w-48 md:w-64 h-48 md:h-64 object-cover rounded-full border-8 border-white/10 food-shadow">
                <div class="absolute top-0 right-0 w-8 h-8 bg-red-600 rounded-full blur-md opacity-60"></div>
            </div>

            <!-- Review Card - Floating Bottom Right -->
            <div class="absolute bottom-[-20px] md:bottom-10 right-0 md:right-10 z-40 stat-card rounded-2xl p-4 flex items-center gap-4 w-64 animate-bounce" style="animation-duration: 4s;">
                <img src="https://i.pravatar.cc/150?u=aliahmad" alt="User" class="w-12 h-12 rounded-full border-2 border-green-500">
                <div>
                    <h4 class="font-bold text-sm">Bassit Abbas</h4>
                    <div class="flex items-center gap-1 text-xs text-yellow-400">
                        <span>★</span>
                        <span class="text-white font-medium">4.5</span>
                        <span class="text-red-400 ml-2">❤ 1k Likes</span>
                    </div>
                </div>
            </div>

            <!-- Background Glow -->
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-green-500/10 rounded-full blur-[100px] -z-10"></div>
        </div>
    </main>

    <!-- Footer Stats / Mobile Bottom Spacing -->
    <div class="container mx-auto px-6 py-12">
        <div class="flex flex-wrap gap-8 justify-center md:justify-start opacity-50">
            <!-- Mock social icons or partners -->
        </div>
    </div>

    
</body>
</html>
