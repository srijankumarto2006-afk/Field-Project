<!DOCTYPE html>
<html>
<head>

<title>Simple OTP Login</title>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:100px;
}

input{
padding:10px;
margin:10px;
width:200px;
}

button{
padding:10px 20px;
background:red;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<h2>Login With OTP</h2>

<input type="text" id="phone" placeholder="Enter Mobile Number">
<br>

<button onclick="sendOTP()">Send OTP</button>

<br><br>

<input type="text" id="otp" placeholder="Enter OTP">

<br>

<button onclick="verifyOTP()">Verify OTP</button>


<h3 id="showOTP"></h3>


<script>

var generatedOTP;


function sendOTP()
{

generatedOTP =
Math.floor(100000 + Math.random()*900000);

document.getElementById("showOTP").innerHTML =
"Your OTP is : " + generatedOTP;

alert("OTP Generated");

}



function verifyOTP()
{

var enteredOTP =
document.getElementById("otp").value;


if(enteredOTP == generatedOTP)
{

alert("Login Successful");

}
else
{

alert("Wrong OTP");

}

}


</script>

</body>
</html>
